logging:
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  datefmt: '%Y-%m-%d %H:%M:%S'
  log_file: 'graph.log'

ollama:
  model: orieg/gemma3-tools:4b
  temperature: 0
  embeddings_model: embeddinggemma

launch:
  model: ollama # azureai
  embeddings: ollama # azureai
  turbo_model: None
