# Global runtime configuration shared by notebooks, scripts and services.
#
# `launch.model` and `launch.embeddings` select the provider family used by
# `LLMServices.build_runtime()` and `LLMServices.launch()`.
# The provider-specific sections below define the constructor kwargs passed to
# each backend client after resolving any `secret:` through `get_secret()`, which 
# checks the environment first and then Azure Key Vault.

ollama:
  model:
    model: gemma4:e4b # ministral-3:8b
    temperature: 0
  embeddings:
    model: embeddinggemma

azureai:
  model:
    endpoint:
      secret: AZURE_FOUNDRY_PROJECT_ENDPOINT
    # credential: Not needed if using DefaultAzureCredential and the environment is configured correctly
    #   secret: AZURE_INFERENCE_CREDENTIAL
    model:
      secret: AZURE_INFERENCE_MODEL_NAME
    api_version:
      secret: AZURE_INFERENCE_API_VERSION
    temperature: 0
  embeddings:
    endpoint:
      secret: AZURE_FOUNDRY_PROJECT_ENDPOINT
    # credential: Not needed if using DefaultAzureCredential and the environment is configured correctly
    #   secret: AZURE_EMBEDDINGS_CREDENTIAL
    model:
      secret: AZURE_EMBEDDINGS_MODEL_NAME
    api_version:
      secret: AZURE_EMBEDDINGS_API_VERSION

launch:
  model: ollama # azureai
  embeddings: ollama # azureai
  turbo_model: None
