# Global runtime configuration shared by notebooks, scripts and services.
#
# `launch.model` and `launch.embeddings` select the backend family to use.
# The provider-specific sections below define the defaults consumed by
# `LLMServices.launch()`.

ollama:
  # Example: make sure the selected Ollama model is available locally.
  model: gemma4:e4b # ministral-3:8b
  temperature: 0
  embeddings_model: embeddinggemma

launch:
  # Supported values in the current project are `ollama` and `azureai`.
  model: ollama # azureai
  embeddings: ollama # azureai
  turbo_model: None
