parameters:
  - name: context_path
    type: string
  - name: dockerfile
    type: string
  - name: image_name
    type: string
  - name: tag_version
    type: string
  - name: build_args
    type: object
    default: {}    
  - name: service_connection
    type: string

steps:
  - task: AzureCLI@2
    displayName: Build and Push Image to ACR
    continueOnError: false
    inputs:
      azureSubscription: ${{ parameters.service_connection }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        imageName=${{ parameters.image_name }}
        imageTag=${{ parameters.tag_version }}
        imageDefinition=$imageName:$imageTag
        containerRegistry=$(azure_container_registry_name).azurecr.io
        registry=$containerRegistry/$imageName

        echo "Building environment: '$imageName' into docker image '$imageDefinition'"

        echo "Listing available images"
        docker image ls

        echo "Log in against ACR"
        az acr login --name $containerRegistry

        echo "Building Dockerfile"
        
        # Build the build-args string dynamically
        BUILD_ARGS=""
        ${{ each arg in parameters.build_args }}:
        BUILD_ARGS="$BUILD_ARGS --build-arg ${{ arg.key }}='${{ arg.value }}'"
        ${{ end }}
        
        docker build -f ${{ parameters.dockerfile }} \
          $BUILD_ARGS \
          -t $registry/$imageDefinition \
          ${{ parameters.context_path }}

        echo "Pushing file to registry"
        docker image push $registry/$imageDefinition

        echo "Deleting created file"
        docker rmi $registry/$imageDefinition

        echo "List remaining images after build"
        docker image ls