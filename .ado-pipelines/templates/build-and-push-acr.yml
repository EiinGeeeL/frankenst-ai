parameters:
  - name: context_path
    type: string
  - name: dockerfile
    type: string
  - name: image_name
    type: string
  - name: tag_version
    type: string
  - name: build_args
    type: object
    default: {}    
  - name: service_connection
    type: string

steps:
  - task: AzureCLI@2
    displayName: Build and Push Image to ACR
    continueOnError: false
    inputs:
      azureSubscription: ${{ parameters.service_connection }}
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -euo pipefail

        imageName=${{ parameters.image_name }}
        imageTag=${{ parameters.tag_version }}
        imageDefinition=$imageName:$imageTag
        registryName=$(azure_container_registry_name)
        containerRegistry=${registryName}.azurecr.io
        registry=$containerRegistry/$imageName

        echo "Building environment: '$imageName' into docker image"

        echo "Listing available images"
        docker image ls

        echo "Log in against ACR"
        az acr login --name $registryName

        echo "Building Dockerfile"

        # Build the build-args array dynamically from injected env
        BUILD_ARGS=()
        while IFS='=' read -r env_var value; do
          arg_key="${env_var#BUILD_ARG_}"
          BUILD_ARGS+=(--build-arg "${arg_key}=${value}")
        done < <(env | awk -F= '/^BUILD_ARG_/ { print $0 }' | sort)
        
        docker build -f ${{ parameters.dockerfile }} \
          "${BUILD_ARGS[@]}" \
          -t $registry/$imageDefinition \
          ${{ parameters.context_path }}

        echo "Pushing file to registry"
        docker image push $registry/$imageDefinition

        echo "Deleting created file"
        docker rmi $registry/$imageDefinition

        echo "List remaining images after build"
        docker image ls
    env:
      ${{ each arg in parameters.build_args }}:
        BUILD_ARG_${{ arg.key }}: ${{ arg.value }}